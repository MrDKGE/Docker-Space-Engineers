# ─────────────────────────────────────────────────────────
#  Supervisor — manages all processes inside the container
#
#  Start order (by priority):
#    10  Xvfb            — virtual display
#    20  x11vnc          — VNC server (connects to the display)
#    30  Fluxbox         — lightweight window manager
#    40  Space Engineers — the game server (via startup.sh)
#    50  noVNC           — web-based VNC client (port 6080)
# ─────────────────────────────────────────────────────────

[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log

# ── Xvfb — virtual framebuffer (creates display :1) ──
[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 %(ENV_RESOLUTION)s
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/xvfb.log
redirect_stderr=true
stdout_logfile_maxbytes=1MB
stdout_logfile_backups=1

# ── x11vnc — VNC server ──
[program:x11vnc]
command=/usr/bin/x11vnc -display :1 -nopw -forever -shared -rfbport 5900
autostart=true
autorestart=true
priority=20
stdout_logfile=/var/log/x11vnc.log
redirect_stderr=true
stdout_logfile_maxbytes=1MB
stdout_logfile_backups=1

# ── Fluxbox — window manager ──
[program:fluxbox]
command=/usr/bin/fluxbox
environment=DISPLAY=":1"
autostart=true
autorestart=true
priority=30
stdout_logfile=/var/log/fluxbox.log
redirect_stderr=true
stdout_logfile_maxbytes=1MB
stdout_logfile_backups=1

# ── Space Engineers Dedicated Server (via Wine) ──
#    startup.sh handles: first-time install and launch.
[program:spaceengineers]
command=/startup.sh
environment=DISPLAY=":1",WINEPREFIX="/root/.wine",WINEARCH="win64"
autostart=true
autorestart=true
priority=40
startsecs=30
startretries=3
stdout_logfile=/var/log/spaceengineers.log
redirect_stderr=true
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2

# ── noVNC — web-based VNC client (port 6080) ──
[program:novnc]
command=/usr/share/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080
autostart=true
autorestart=true
priority=50
stdout_logfile=/var/log/novnc.log
redirect_stderr=true
stdout_logfile_maxbytes=1MB
stdout_logfile_backups=1